name: Update Profile

on:
  schedule:
    - cron: "23 5 * * 0" # weekly, Sundays 05:23 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  # Generate a contribution-graph snake from *your own* activity
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Rebuild the Medium article cards from the latest RSS feed
  medium-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/gen_medium_cards.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh Medium cards"
          file_pattern: assets/medium/*.svg
